spring:
  application:
    name: mvc
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/${POSTGRES_DB}}
    username: ${DB_USERNAME:${POSTGRES_USER}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include:
          - health
          - prometheus
  endpoint:
    health:
      enabled: true
      show-details: always
    prometheus:
      enabled: true